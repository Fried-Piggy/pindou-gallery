<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧩 拼豆小窝 - Piggy's Perler Beads</title>
<style>
/* ============ CSS Variables & Themes ============ */
:root {
  --bg: #fff5f7;
  --bg-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='2' fill='%23ffb8c6' opacity='0.3'/%3E%3Ccircle cx='40' cy='30' r='1.5' fill='%23ffb8c6' opacity='0.2'/%3E%3Ccircle cx='20' cy='50' r='2.5' fill='%23ffb8c6' opacity='0.25'/%3E%3C/svg%3E");
  --card-bg: #ffffff;
  --card-shadow: 0 4px 20px rgba(255, 150, 170, 0.15);
  --text-primary: #5d4037;
  --text-secondary: #8d6e63;
  --accent: #ff7eb3;
  --accent2: #ffa8d0;
  --accent-light: #ffe0ec;
  --border: #f8bbd0;
  --header-bg: linear-gradient(135deg, #fff0f5, #ffe0ec);
  --sidebar-bg: rgba(255, 255, 255, 0.85);
  --btn-bg: #ff7eb3;
  --btn-text: #fff;
  --tag-bg: #ffe0ec;
  --tag-text: #d6336c;
  --pixel-shadow: 3px 3px 0 #ffb8c6;
  --music-btn-bg: #ff7eb3;
  --modal-overlay: rgba(255, 240, 245, 0.9);
  --input-bg: #fff;
  --input-border: #f8bbd0;
}

[data-theme="mint"] {
  --bg: #f0fff4;
  --bg-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='15' cy='15' r='2' fill='%2381c784' opacity='0.25'/%3E%3Ccircle cx='45' cy='35' r='1.8' fill='%2381c784' opacity='0.2'/%3E%3C/svg%3E");
  --card-bg: #ffffff;
  --card-shadow: 0 4px 20px rgba(129, 199, 132, 0.15);
  --accent: #66bb6a;
  --accent2: #a5d6a7;
  --accent-light: #e8f5e9;
  --border: #c8e6c9;
  --header-bg: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  --btn-bg: #66bb6a;
  --tag-bg: #e8f5e9;
  --tag-text: #2e7d32;
  --pixel-shadow: 3px 3px 0 #a5d6a7;
  --music-btn-bg: #66bb6a;
  --modal-overlay: rgba(240, 255, 244, 0.9);
  --input-border: #c8e6c9;
}

[data-theme="sky"] {
  --bg: #f0f8ff;
  --bg-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='2' fill='%2364b5f6' opacity='0.2'/%3E%3Ccircle cx='42' cy='42' r='1.5' fill='%2364b5f6' opacity='0.15'/%3E%3C/svg%3E");
  --card-bg: #ffffff;
  --card-shadow: 0 4px 20px rgba(100, 180, 246, 0.15);
  --accent: #42a5f5;
  --accent2: #90caf9;
  --accent-light: #e3f2fd;
  --border: #bbdefb;
  --header-bg: linear-gradient(135deg, #e3f2fd, #bbdefb);
  --btn-bg: #42a5f5;
  --tag-bg: #e3f2fd;
  --tag-text: #1565c0;
  --pixel-shadow: 3px 3px 0 #90caf9;
  --music-btn-bg: #42a5f5;
  --modal-overlay: rgba(240, 248, 255, 0.9);
  --input-border: #bbdefb;
}

[data-theme="lavender"] {
  --bg: #f5f0ff;
  --bg-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='18' cy='18' r='2' fill='%23b39ddb' opacity='0.2'/%3E%3Ccircle cx='48' cy='28' r='1.5' fill='%23b39ddb' opacity='0.15'/%3E%3C/svg%3E");
  --card-bg: #ffffff;
  --card-shadow: 0 4px 20px rgba(179, 157, 219, 0.15);
  --accent: #7e57c2;
  --accent2: #b39ddb;
  --accent-light: #ede7f6;
  --border: #d1c4e9;
  --header-bg: linear-gradient(135deg, #ede7f6, #d1c4e9);
  --btn-bg: #7e57c2;
  --tag-bg: #ede7f6;
  --tag-text: #4527a0;
  --pixel-shadow: 3px 3px 0 #b39ddb;
  --music-btn-bg: #7e57c2;
  --modal-overlay: rgba(245, 240, 255, 0.9);
  --input-border: #d1c4e9;
}

[data-theme="peach"] {
  --bg: #fff8f0;
  --bg-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='20' r='2' fill='%23ffab91' opacity='0.2'/%3E%3Ccircle cx='40' cy='10' r='1.5' fill='%23ffab91' opacity='0.15'/%3E%3C/svg%3E");
  --card-bg: #ffffff;
  --card-shadow: 0 4px 20px rgba(255, 171, 145, 0.15);
  --accent: #ff7043;
  --accent2: #ffab91;
  --accent-light: #fbe9e7;
  --border: #ffccbc;
  --header-bg: linear-gradient(135deg, #fbe9e7, #ffccbc);
  --btn-bg: #ff7043;
  --tag-bg: #fbe9e7;
  --tag-text: #bf360c;
  --pixel-shadow: 3px 3px 0 #ffab91;
  --music-btn-bg: #ff7043;
  --modal-overlay: rgba(255, 248, 240, 0.9);
  --input-border: #ffccbc;
}

/* ============ Reset & Base ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background-color: var(--bg);
  background-image: var(--bg-pattern);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background-color 0.5s, background-image 0.5s;
  overflow-x: hidden;
}

/* ============ Pixel Art Decorations ============ */
.pixel-heart {
  display: inline-block;
  image-rendering: pixelated;
  font-size: 20px;
}
.pixel-star {
  display: inline-block;
  image-rendering: pixelated;
  animation: twinkle 1.5s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* Floating cherry blossoms */
.sakura-container {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.sakura {
  position: absolute;
  font-size: 20px;
  animation: fall linear infinite;
  opacity: 0.6;
}
@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0.7; }
  50% { transform: translateY(50vh) rotate(180deg) translateX(30px); opacity: 0.4; }
  100% { transform: translateY(105vh) rotate(360deg) translateX(-20px); opacity: 0; }
}

/* ============ Header ============ */
.header {
  background: var(--header-bg);
  padding: 24px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  border-bottom: 3px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.header-title {
  font-size: 2em;
  font-weight: 700;
  color: var(--accent);
  text-shadow: 2px 2px 0 var(--accent-light);
  letter-spacing: 2px;
  cursor: default;
  user-select: none;
}
.header-subtitle {
  font-size: 0.9em;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ============ Main Layout ============ */
.app-container {
  display: flex;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  gap: 24px;
  position: relative;
  z-index: 1;
}

/* ============ Sidebar ============ */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  position: sticky;
  top: 120px;
  align-self: flex-start;
  max-height: calc(100vh - 140px);
  overflow-y: auto;
}
.sidebar-card {
  background: var(--sidebar-bg);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 20px;
  border: 2px solid var(--border);
  box-shadow: var(--card-shadow);
  margin-bottom: 16px;
}
.sidebar-title {
  font-size: 1em;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Profile Card */
#profileCard { position: relative; }
.profile-container {
  display: flex;
  align-items: center;
  gap: 14px;
}
.profile-avatar-wrap {
  width: 64px; height: 64px;
  border-radius: 16px;
  border: 3px solid var(--border);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  cursor: default;
  background: var(--accent-light);
  display: flex; align-items: center; justify-content: center;
}
.profile-avatar-wrap.editable { cursor: pointer; }
.profile-avatar-wrap.editable:hover .profile-avatar-edit {
  opacity: 1;
}
.profile-avatar-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.profile-avatar-placeholder {
  font-size: 2em;
}
.profile-avatar-edit {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2em;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.profile-info {
  flex: 1;
  min-width: 0;
}
.profile-name {
  font-size: 1.1em;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
}
.profile-bio {
  font-size: 0.8em;
  color: var(--text-secondary);
  margin-top: 4px;
  line-height: 1.4;
  word-break: break-word;
}
.drop-zone-sm {
  border-radius: 10px;
  min-height: 50px !important;
  padding: 10px !important;
}
.date-select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card-bg);
  color: var(--text-primary);
  font-size: 0.9em;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 0.2s;
}
.date-select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

/* Theme selector */
.theme-options {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.theme-dot {
  width: 28px; height: 28px;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
}
.theme-dot:hover { transform: scale(1.15); }
.theme-dot.active { border-color: var(--text-primary); box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 4px var(--accent); }
.theme-dot.sakura { background: linear-gradient(135deg, #ff7eb3, #ffb8c6); }
.theme-dot.mint { background: linear-gradient(135deg, #66bb6a, #a5d6a7); }
.theme-dot.sky { background: linear-gradient(135deg, #42a5f5, #90caf9); }
.theme-dot.lavender { background: linear-gradient(135deg, #7e57c2, #b39ddb); }
.theme-dot.peach { background: linear-gradient(135deg, #ff7043, #ffab91); }

/* ============ Timeline ============ */
.timeline {
  flex: 1;
  min-width: 0;
}
.timeline-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
  font-size: 1.1em;
}
.timeline-empty .empty-icon {
  font-size: 4em;
  display: block;
  margin-bottom: 16px;
}
.posts-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ============ Post Card ============ */
.post-card {
  background: var(--card-bg);
  border-radius: 20px;
  overflow: hidden;
  border: 2px solid var(--border);
  box-shadow: var(--card-shadow);
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}
.post-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}
.post-header {
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.post-avatar {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--accent-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5em;
  flex-shrink: 0;
  border: 2px solid var(--border);
  overflow: hidden;
}
.post-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.post-meta { flex: 1; }
.post-title {
  font-size: 1.1em;
  font-weight: 700;
  color: var(--text-primary);
}
.post-date {
  font-size: 0.8em;
  color: var(--text-secondary);
  margin-top: 2px;
}
.post-date::before { content: '📅 '; }
.post-body {
  padding: 12px 20px;
  font-size: 0.95em;
  color: var(--text-primary);
  line-height: 1.7;
}
.post-images {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 0 20px 16px;
}
.post-image-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 1;
  background: var(--accent-light);
  border: 2px solid var(--border);
  transition: transform 0.2s;
}
.post-image-wrap:hover { transform: scale(1.03); }
.post-image-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.lazy-img-wrap .post-image-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 3em;
  color: var(--accent2);
}
.lazy-img-wrap.loaded .post-image-placeholder { display: none; }
.lazy-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity 0.3s;
}
.lazy-img-wrap.loaded img { opacity: 1; }
.post-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--accent-light);
  display: flex;
  gap: 16px;
}
.post-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--tag-bg);
  color: var(--tag-text);
  font-size: 0.8em;
  font-weight: 500;
}

/* Admin action buttons */
.admin-actions {
  position: absolute;
  top: 12px; right: 16px;
  display: flex; gap: 6px;
  opacity: 0;
  transition: opacity 0.2s;
}
.post-card:hover .admin-actions,
.admin-actions.visible { opacity: 1; }
.btn-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
  font-size: 0.85em;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-icon:hover { background: var(--accent-light); transform: scale(1.1); }
.btn-icon.danger:hover { background: #ffebee; border-color: #ef9a9a; }

/* ============ Music Player ============ */
.music-toggle {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px; height: 60px;
  border-radius: 18px;
  background: var(--music-btn-bg);
  color: white;
  border: 3px solid white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 0 4px var(--music-btn-bg);
  cursor: pointer;
  font-size: 1.6em;
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  transition: all 0.3s;
  animation: musicPulse 2s ease-in-out infinite;
}
.music-toggle:hover {
  transform: scale(1.1);
}
.music-toggle.playing {
  animation: musicGlow 1.5s ease-in-out infinite;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 0 4px var(--music-btn-bg), 0 0 30px var(--accent);
  background: var(--accent);
}
@keyframes musicPulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 0 4px var(--music-btn-bg); }
  50% { box-shadow: 0 4px 24px rgba(0,0,0,0.25), 0 0 0 6px var(--music-btn-bg), 0 0 20px var(--accent); }
}
@keyframes musicGlow {
  0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 0 4px var(--music-btn-bg), 0 0 20px var(--accent); }
  50% { box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 0 6px var(--music-btn-bg), 0 0 40px var(--accent), 0 0 60px var(--accent2); }
}

.music-panel {
  position: fixed;
  bottom: 100px;
  right: 30px;
  background: var(--card-bg);
  border-radius: 16px;
  padding: 16px;
  border: 2px solid var(--border);
  box-shadow: var(--card-shadow);
  z-index: 199;
  min-width: 250px;
  display: none;
}
.music-panel.visible { display: block; animation: slideUp 0.3s ease; }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.music-panel-title {
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
  font-size: 0.9em;
}
.music-track {
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85em;
  color: var(--text-secondary);
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.music-track:hover { background: var(--accent-light); }
.music-track.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }

/* ============ Admin Panel ============ */
.admin-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
}
.admin-overlay.visible { display: flex; }
.admin-panel {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  border: 3px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: slideUp 0.3s ease;
}
.admin-panel h2 {
  color: var(--accent);
  margin-bottom: 20px;
  font-size: 1.4em;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  font-size: 0.9em;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid var(--input-border);
  border-radius: 10px;
  font-size: 0.95em;
  background: var(--input-bg);
  color: var(--text-primary);
  font-family: inherit;
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group .hint {
  font-size: 0.8em;
  color: var(--text-secondary);
  margin-top: 4px;
}

.drop-zone {
  border: 3px dashed var(--border);
  border-radius: 14px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: var(--accent-light);
  min-height: 100px;
  display: flex; align-items: center; justify-content: center;
}
.drop-zone:hover,
.drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
  box-shadow: 0 0 0 4px var(--accent-light);
  transform: scale(1.01);
}
.drop-zone-hint {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text-secondary);
  font-size: 0.9em;
  pointer-events: none;
}
.drop-zone.has-images {
  padding: 12px;
  border-style: solid;
}
.drop-zone.has-images .drop-zone-hint {
  font-size: 0.8em;
  opacity: 0.7;
}
.image-previews {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-top: 10px;
}
.image-preview-item {
  width: 90px; height: 90px;
  border-radius: 10px;
  border: 2px solid var(--border);
  overflow: hidden;
  position: relative;
  background: var(--accent-light);
  flex-shrink: 0;
}
.image-preview-item img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.image-preview-item .remove-img {
  position: absolute;
  top: 4px; right: 4px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 0.7em;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.image-preview-item .remove-img:hover {
  background: rgba(200,0,0,0.8);
  transform: scale(1.1);
}
.image-preview-item .download-img-btn {
  position: absolute;
  bottom: 4px; left: 4px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 0.65em;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.image-preview-item .download-img-btn:hover {
  background: rgba(0,120,200,0.8);
  transform: scale(1.1);
}
.image-preview-item .img-size-badge {
  position: absolute;
  bottom: 4px; right: 4px;
  background: rgba(0,0,0,0.55);
  color: white;
  font-size: 0.6em;
  padding: 1px 6px;
  border-radius: 8px;
}

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 24px;
  border-radius: 12px;
  border: none;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-primary {
  background: var(--btn-bg);
  color: var(--btn-text);
  box-shadow: var(--pixel-shadow);
}
.btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-secondary {
  background: var(--accent-light);
  color: var(--accent);
  border: 2px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }
.btn-danger {
  background: #ffebee;
  color: #c62828;
  border: 2px solid #ef9a9a;
}

/* ============ Image Lightbox ============ */
.lightbox {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 500;
  display: none;
  align-items: center; justify-content: center;
  cursor: pointer;
}
.lightbox.visible { display: flex; }
.lightbox img {
  max-width: 90vw; max-height: 90vh;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.lightbox-close {
  position: absolute;
  top: 20px; right: 20px;
  width: 44px; height: 44px;
  border-radius: 14px;
  background: rgba(255,255,255,0.2);
  color: white;
  border: 2px solid rgba(255,255,255,0.3);
  font-size: 1.2em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text-primary);
  color: white;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 0.9em;
  z-index: 600;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ============ New Post FAB ============ */
.fab {
  position: fixed;
  bottom: 30px;
  left: 30px;
  width: 56px; height: 56px;
  border-radius: 16px;
  background: var(--btn-bg);
  color: var(--btn-text);
  border: 3px solid white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 0 4px var(--btn-bg);
  cursor: pointer;
  font-size: 1.5em;
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  transition: all 0.2s;
}
.fab:hover { transform: scale(1.1); }
.fab.visible { display: flex; }

/* ============ Responsive ============ */
@media (max-width: 768px) {
  /* Kill expensive effects on mobile */
  .sakura-container { display: none; }
  .header, .sidebar-card { backdrop-filter: none; }
  .sidebar-card { background: var(--card-bg); }

  /* Header: scroll away with page */
  .header {
    position: static;
    padding: 14px 12px;
  }
  .header-title { font-size: 1.3em; }
  .header-subtitle { font-size: 0.75em; }

  .app-container {
    flex-direction: column;
    padding: 8px;
    gap: 8px;
  }

  /* Sidebar: compact 2-col grid, no scroll */
  .sidebar {
    width: 100%;
    position: static;
    max-height: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    overflow: visible;
  }
  .sidebar-card {
    min-width: 0;
    flex-shrink: unset;
    padding: 10px;
    margin-bottom: 0;
    font-size: 0.8em;
    border-radius: 12px;
  }
  /* Profile + About span full width */
  #profileCard, #aboutCard { grid-column: 1 / -1; }

  .profile-container { gap: 8px; }
  .profile-avatar-wrap { width: 44px; height: 44px; border-radius: 12px; }
  .profile-name { font-size: 0.95em; }
  .profile-bio { font-size: 0.72em; }

  .post-images { grid-template-columns: repeat(3, 1fr); gap: 3px; }
  .post-card { border-radius: 14px; }
  .post-header { padding: 10px 14px 8px; gap: 8px; }
  .post-avatar { width: 36px; height: 36px; border-radius: 10px; font-size: 1.2em; }
  .post-title { font-size: 0.95em; }
  .post-date { font-size: 0.7em; }
  .post-body { padding: 6px 14px; font-size: 0.85em; }
  .post-images { padding: 0 14px 10px; }
  .post-footer { padding: 6px 14px; }
  .post-tag { font-size: 0.7em; padding: 2px 8px; }

  .admin-panel { width: 95%; padding: 16px; }
  .music-toggle { width: 46px; height: 46px; bottom: 16px; right: 12px; font-size: 1.2em; border-radius: 14px; animation: none; }
  .fab { width: 42px; height: 42px; bottom: 16px; left: 12px; font-size: 1.1em; border-radius: 12px; }

  /* Disable transitions/animations on mobile */
  body { transition: none; }
  .post-card:hover { transform: none; }
  .post-image-wrap:hover { transform: none; }
  .drop-zone:hover, .drop-zone.drag-over { transform: none; }
}
</style>
</head>

<!-- Toast -->

<script>
// ============ App State ============
const STATE_KEY = 'pindou_posts';
const SETTINGS_KEY = 'pindou_settings';
const ADMIN_CLICKS = 5;

let posts = [];
let settings = {
  theme: 'sakura',
  musicPlaying: false,
  currentTrack: 0,
  aboutText: '🧩 这里记录了我的拼豆作品们～\n每一颗豆豆都是用心拼出来的小可爱！',
  profileName: 'Piggy',
  profileBio: '',
  profileAvatar: '' // data URL or empty
};
let isAdmin = false;
let adminClickCount = 0;
let editingPostId = null;
let musicPlaylist = [];
let droppedImages = []; // [{file, objectUrl, filename}] — temp storage while editing

// ============ Init ============
document.addEventListener('DOMContentLoaded', async () => {
  loadSettings();
  await loadPosts();
  renderAll();
  createSakura();
  initMusicPlayer();
  bindEvents();
  autoSaveMonitor();
  createExportButton();
});

// ============ Settings ============
function loadSettings() {
  try {
    const saved = localStorage.getItem(SETTINGS_KEY);
    if (saved) settings = { ...settings, ...JSON.parse(saved) };
  } catch(e) {}
  // Ensure aboutText always has a default
  if (!settings.aboutText) {
    settings.aboutText = '🧩 这里记录了我的拼豆作品们～\n每一颗豆豆都是用心拼出来的小可爱！';
  }
  document.body.setAttribute('data-theme', settings.theme);
  updateThemeDots();
}

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  } catch(e) {
    console.error('Settings save error:', e);
  }
}

// ============ Posts Data ============
async function loadPosts() {
  // Always fetch from posts.json — localStorage is too small for image data
  try {
    const resp = await fetch('posts.json');
    if (resp.ok) {
      const data = await resp.json();
      if (Array.isArray(data)) {
        posts = data;
      } else if (data && Array.isArray(data.posts)) {
        posts = data.posts;
        syncMeta(data._meta);
      }
    }
  } catch(e) {
    console.log('未找到 posts.json，尝试从 localStorage 恢复...');
    // Fallback: try localStorage for emergency recovery
    try {
      const saved = localStorage.getItem(STATE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        posts = Array.isArray(parsed) ? parsed : (parsed.posts || []);
        showToast('⚠️ 已从浏览器缓存恢复数据，请尽快导出');
      } else {
        posts = [];
      }
    } catch(e2) { posts = []; }
  }
  // Save a lightweight backup (no images) for emergency recovery
  saveLightBackup();
}

function saveLightBackup() {
  // Strip image data URLs to keep localStorage tiny (metadata only)
  try {
    const lightPosts = posts.map(p => ({
      ...p,
      images: (p.images || []).map(img => img.startsWith('data:') ? '[image]' : img)
    }));
    localStorage.setItem(STATE_KEY, JSON.stringify(lightPosts));
    updateStorageInfo();
  } catch(e) {
    // localStorage full even for light data — unlikely but handle gracefully
    console.warn('Cannot save backup:', e.message);
  }
}

function getStorageUsage() {
  let total = 0;
  for (const key in localStorage) {
    if (localStorage.hasOwnProperty(key)) {
      total += localStorage[key].length * 2; // UTF-16 chars → bytes approx
    }
  }
  return Math.round(total / 1024); // KB
}

function updateStorageInfo() {
  const usage = getStorageUsage();
  const maxKB = 5120; // rough 5MB estimate
  const pct = Math.min(100, Math.round(usage / maxKB * 100));
  const textEl = document.getElementById('storageText');
  const fillEl = document.getElementById('storageFill');
  if (textEl) {
    textEl.textContent = `💾 浏览器存储：${usage}KB / ~${maxKB}KB`;
    if (pct > 80) textEl.style.color = '#e53935';
    else if (pct > 50) textEl.style.color = '#ef6c00';
    else textEl.style.color = '';
  }
  if (fillEl) {
    fillEl.style.width = pct + '%';
    if (pct > 80) fillEl.style.background = '#e53935';
    else if (pct > 50) fillEl.style.background = '#ef6c00';
  }
  console.log(`localStorage: ${usage}KB / ~${maxKB}KB (${pct}%)`);
}

function syncMeta(meta) {
  if (!meta) return;
  let changed = false;
  if (meta.aboutText && meta.aboutText !== settings.aboutText) {
    settings.aboutText = meta.aboutText;
    changed = true;
  }
  if (meta.profileName && meta.profileName !== settings.profileName) {
    settings.profileName = meta.profileName;
    changed = true;
  }
  if (meta.profileBio !== undefined && meta.profileBio !== settings.profileBio) {
    settings.profileBio = meta.profileBio;
    changed = true;
  }
  if (meta.profileAvatar !== undefined && meta.profileAvatar !== settings.profileAvatar) {
    settings.profileAvatar = meta.profileAvatar;
    changed = true;
  }
  if (meta.musicPlaylist && Array.isArray(meta.musicPlaylist)) {
    musicPlaylist = meta.musicPlaylist;
    localStorage.setItem('pindou_playlist', JSON.stringify(musicPlaylist));
    renderMusicTracks();
    changed = true;
  }
  if (changed) saveSettings();
}

function getSortedPosts(filterYearMonth = 'all') {
  let sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
  if (filterYearMonth !== 'all') {
    sorted = sorted.filter(p => p.date.startsWith(filterYearMonth));
  }
  return sorted;
}

function getYearMonths() {
  const months = new Set();
  posts.forEach(p => {
    if (p.date) {
      const parts = p.date.split('-');
      if (parts.length >= 2) months.add(`${parts[0]}-${parts[1]}`);
    }
  });
  return [...months].sort().reverse();
}

// ============ Render ============
function renderAll() {
  renderTimeline();
  renderDateFilter();
  renderAbout();
  renderProfile();
  setTimeout(initLazyLoad, 100);
}

const PAGE_SIZE = 8;
let renderedCount = 0;
let currentFilteredPosts = [];

function renderTimeline(filterYearMonth = 'all', append = false) {
  const timeline = document.getElementById('timeline');
  const sorted = getSortedPosts(filterYearMonth);

  if (!append) {
    currentFilteredPosts = sorted;
    renderedCount = 0;
  }

  if (currentFilteredPosts.length === 0) {
    timeline.innerHTML = `
      <div class="timeline-empty">
        <span class="empty-icon">🧩</span>
        <p>还没有作品呢～点击左下角按钮发布第一条动态吧！</p>
      </div>`;
    return;
  }

  const batch = currentFilteredPosts.slice(renderedCount, renderedCount + PAGE_SIZE);
  renderedCount += batch.length;
  const batchHTML = batch.map(post => renderPostCard(post)).join('');

  if (!append) {
    timeline.innerHTML = `<div class="posts-list">${batchHTML}</div>`;
  } else {
    timeline.querySelector('.posts-list').insertAdjacentHTML('beforeend', batchHTML);
  }

  // Add "load more" sentinel if more posts remain
  const existingSentinel = document.getElementById('loadMoreSentinel');
  if (existingSentinel) existingSentinel.remove();

  if (renderedCount < currentFilteredPosts.length) {
    const sentinel = document.createElement('div');
    sentinel.id = 'loadMoreSentinel';
    sentinel.style.cssText = 'height:40px;text-align:center;padding:10px;color:var(--text-secondary);font-size:0.85em;cursor:pointer;';
    sentinel.textContent = `📜 加载更多 (${currentFilteredPosts.length - renderedCount} 条)`;
    sentinel.addEventListener('click', () => {
      renderTimeline(filterYearMonth, true);
      setTimeout(initLazyLoad, 100);
    });
    timeline.querySelector('.posts-list').appendChild(sentinel);
  }

}

function renderPostCard(post) {
  const images = Array.isArray(post.images) ? post.images : (post.images ? post.images.split(',').map(s => s.trim()).filter(Boolean) : []);
  const tags = Array.isArray(post.tags) ? post.tags : (post.tags ? post.tags.split(',').map(s => s.trim()).filter(Boolean) : []);

  const imagesHTML = images.length > 0 ? `
    <div class="post-images">
      ${images.map(img => {
        const fname = img.trim();
        const thumbSrc = 'images/thumbnails/' + fname;
        const origSrc = 'images/' + fname;
        return `
        <div class="post-image-wrap lazy-img-wrap" onclick="openLightbox('${escapeHTML(origSrc)}')" data-src="${escapeHTML(thumbSrc)}" data-orig="${escapeHTML(origSrc)}">
          <div class="post-image-placeholder">🧩</div>
        </div>`;
      }).join('')}
    </div>
  ` : '';

  const tagsHTML = tags.length > 0 ? `
    <div class="post-footer">
      ${tags.map(t => `<span class="post-tag">#${escapeHTML(t.trim())}</span>`).join(' ')}
    </div>
  ` : '';

async function handleAvatarFile(file) {

async function savePost() {
  const id = document.getElementById('postId').value;
  const title = document.getElementById('postTitle').value.trim();
  const date = document.getElementById('postDate').value;
  const description = document.getElementById('postDesc').value.trim();
  const tagsRaw = document.getElementById('postTags').value.trim();

  if (!title || !date) {
    showToast('⚠️ 请至少填写标题和日期');
    return;
  }

  // Upload new images to server, keep existing filenames
  const images = [];
  for (const d of droppedImages) {
    if (d.file) {
      try {
        const filename = await uploadImage(d.file, d.filename);
        images.push(filename);
      } catch(e) {
        showToast('⚠️ 上传失败：' + d.filename + ' — ' + e.message);
        return;
      }
    } else {
      images.push(d.filename);
    }
  }

  const tags = tagsRaw ? tagsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

  const postData = { id: id || generateId(), title, date, description, images, tags };

  if (id) {
    const idx = posts.findIndex(p => p.id === id);
    if (idx >= 0) posts[idx] = postData;
  } else {
    posts.unshift(postData);
  }

  saveLightBackup();
  renderAll();
  closePostForm();
  showToast('✅ 动态已保存！图片已存入 images/ 文件夹');
}

// ============ Image Drag & Drop ============
function setupDropZone() {
  const zone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  if (!zone || !fileInput) return;

  // Click to select files
  zone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) handleDroppedFiles(fileInput.files);
    fileInput.value = '';
  });

  // Drag events
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) handleDroppedFiles(e.dataTransfer.files);
  });
}

function handleDroppedFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const objectUrl = URL.createObjectURL(file);
    droppedImages.push({
      file: file,
      objectUrl: objectUrl,
      filename: file.name,
      size: Math.round(file.size / 1024)
    });
  }
  renderImagePreviews();
}

function resizeImage(file, quality = 0.92, maxSize = 2000) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          const ratio = Math.min(maxSize / w, maxSize / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        // Use JPEG for photos, PNG for small/simple images
        const isJpeg = file.type === 'image/jpeg' || file.type === 'image/webp' || file.size > 200 * 1024;
        const mimeType = isJpeg ? 'image/jpeg' : 'image/png';
        resolve(canvas.toDataURL(mimeType, quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderImagePreviews() {
  const container = document.getElementById('imagePreviews');
  const zone = document.getElementById('dropZone');
  if (!container) return;

  if (droppedImages.length === 0) {
    container.innerHTML = '';
    if (zone) { zone.classList.remove('has-images'); }
    return;
  }

  if (zone) { zone.classList.add('has-images'); }

  container.innerHTML = droppedImages.map((d, i) => {
    // Use objectUrl for new files, images/ path for existing
    const src = d.objectUrl || ('images/' + d.filename);
    return `
    <div class="image-preview-item">
      <img src="${escapeHTML(src)}" alt="${escapeHTML(d.filename)}" onerror="this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2em;\\'>🧩</div>'">
      <span class="img-size-badge">${d.size || ''}KB</span>
      <button class="remove-img" onclick="removeDroppedImage(${i})" title="移除">✕</button>
    </div>`;
  }).join('');
}

function removeDroppedImage(index) {
  const d = droppedImages[index];
  if (d && d.objectUrl) URL.revokeObjectURL(d.objectUrl);
  droppedImages.splice(index, 1);
  renderImagePreviews();
}

function downloadImage(dataUrl, filename) {
  if (!dataUrl || !dataUrl.startsWith('data:')) {
    // For filename references, try to download from images/ folder
    const a = document.createElement('a');
    a.href = 'images/' + dataUrl;
    a.download = dataUrl.split('/').pop() || filename;
    a.click();
    return;
  }
  const a = document.createElement('a');
  a.href = dataUrl;
  // Generate a sensible filename
  const ext = dataUrl.startsWith('data:image/png') ? '.png' : '.jpg';
  const base = filename.replace(/\.[^.]+$/, '') || 'image';
  a.download = base + ext;
  a.click();
}

// Export all images from posts as individual files
function exportAllImages() {
  const allImages = [];
  posts.forEach((post, pi) => {
    const imgs = Array.isArray(post.images) ? post.images : [];
    imgs.forEach((src, ii) => {
      if (src.startsWith('data:')) {
        const ext = src.startsWith('data:image/png') ? '.png' : '.jpg';
        allImages.push({
          dataUrl: src,
          filename: `post_${pi}_img_${ii}${ext}`
        });
      }
    });
  });

  if (allImages.length === 0) {
    showToast('⚠️ 没有可导出的图片（图片已嵌入 JSON 中）');
    return;
  }

  showToast(`📥 正在下载 ${allImages.length} 张图片到系统"下载"文件夹...（请允许浏览器多次下载）`);
  allImages.forEach((img, i) => {
    setTimeout(() => {
      downloadImage(img.dataUrl, img.filename);
    }, i * 300); // Stagger downloads to avoid browser blocking
  });
}

function toggleMusicPanel() {
  const panel = document.getElementById('musicPanel');
  const player = document.getElementById('musicPlayer');
  const toggle = document.getElementById('musicToggle');

  if (player.src && !player.paused) {
    // Music is playing → pause it
    player.pause();
    toggle.classList.remove('playing');
    toggle.textContent = '🎵';
    settings.musicPlaying = false;
    saveSettings();
    panel.classList.remove('visible');
  } else if (player.src && player.paused) {
    // Music is paused → resume
    player.play().then(() => {
      toggle.classList.add('playing');
      toggle.textContent = '🎶';
      settings.musicPlaying = true;
      saveSettings();
    }).catch(() => {});
    panel.classList.toggle('visible');
  } else {
    // No music loaded → show panel to pick a track
    panel.classList.toggle('visible');
    if (panel.classList.contains('visible') && musicPlaylist.length > 0) {
      playTrack(settings.currentTrack);
    }
  }
}

function playTrack(index) {
  const player = document.getElementById('musicPlayer');
  const toggle = document.getElementById('musicToggle');
  const track = musicPlaylist[index];

  if (!track) return;

  settings.currentTrack = index;
  player.src = track.src;
  player.play().then(() => {
    toggle.classList.add('playing');
    toggle.textContent = '🎶';
    settings.musicPlaying = true;
    saveSettings();
    renderMusicTracks();
  }).catch(() => {
    showToast('⚠️ 音乐文件不存在，请在 music/ 文件夹中添加 .mp3 文件');
  });
}

  const next = (settings.currentTrack + 1) % musicPlaylist.length;

// ============ Lazy Load Images ============
let lazyObserver = null;
function initLazyLoad() {
  if ('IntersectionObserver' in window) {
    if (lazyObserver) lazyObserver.disconnect();
    lazyObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const wrap = entry.target;
          const src = wrap.dataset.src;
          if (src && !wrap.classList.contains('loaded')) {
            const img = document.createElement('img');
            img.src = src;
            img.alt = '';
            img.loading = 'lazy';
            img.decoding = 'async';
            img.onerror = function() {
              wrap.classList.add('loaded');
              wrap.innerHTML = '<div class="post-image-placeholder">🧩</div>';
            };
            img.onload = function() { wrap.classList.add('loaded'); };
            wrap.appendChild(img);
            lazyObserver.unobserve(wrap);
          }
        }
      });
    }, { rootMargin: '300px' });
    document.querySelectorAll('.lazy-img-wrap:not(.loaded)').forEach(function(w) { lazyObserver.observe(w); });
  } else {
    document.querySelectorAll('.lazy-img-wrap:not(.loaded)').forEach(function(w) {
      var src = w.dataset.src;
      if (src) {
        var img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.onerror = function() {
          w.classList.add('loaded');
          w.innerHTML = '<div class="post-image-placeholder">🧩</div>';
        };
        img.onload = function() { w.classList.add('loaded'); };
        w.appendChild(img);
      }
    });
  }
}

// ============ Sakura Animation ============
function createSakura() {
  const container = document.getElementById('sakuraContainer');
  const emojis = ['🌸', '💮', '🌺', '✿', '❀', '🩷', '⭐'];
  const count = 15;

  for (let i = 0; i < count; i++) {
    const petal = document.createElement('span');
    petal.className = 'sakura';
    petal.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    petal.style.left = Math.random() * 100 + '%';
    petal.style.fontSize = (14 + Math.random() * 16) + 'px';
    petal.style.animationDuration = (8 + Math.random() * 12) + 's';
    petal.style.animationDelay = Math.random() * 10 + 's';
    container.appendChild(petal);
  }
}

// ============ Toast ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ============ Theme Dots ============
function updateThemeDots() {
  document.querySelectorAll('.theme-dot').forEach(dot => {
    dot.classList.toggle('active', dot.dataset.theme === settings.theme);
  });
}

// ============ Auto Save Monitor ============
function autoSaveMonitor() {
  // Monitor localStorage for external changes (other tabs)
  window.addEventListener('storage', (e) => {
    if (e.key === STATE_KEY && e.newValue !== e.oldValue) {
      try {
        posts = JSON.parse(e.newValue);
        renderAll();
      } catch(ex) {}
    }
  });

  // Auto-save light backup periodically
  setInterval(() => {
    saveLightBackup();
  }, 10000);
}

// ============ Keyboard Shortcuts ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closePostForm();
    closeLightbox();
    document.getElementById('musicPanel').classList.remove('visible');
  }
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveLightBackup();
    showToast('💾 数据已备份（不含图片）。请记得导出 posts.json');
  }
  if (e.ctrlKey && e.key === 'e') {
    e.preventDefault();
    if (isAdmin) {
      exportJSON();
    }
  }
});

// ============ Export ============
function createExportButton() {
  // Export JSON button
  const exportBtn = document.createElement('button');
  exportBtn.className = 'btn btn-secondary';
  exportBtn.textContent = '📦 导出 posts.json';
  exportBtn.style.cssText = 'position:fixed;bottom:160px;left:30px;z-index:201;display:none;';
  exportBtn.id = 'btnExport';
  exportBtn.addEventListener('click', exportJSON);
  document.body.appendChild(exportBtn);

  // Storage info bar
  const storageBar = document.createElement('div');
  storageBar.id = 'storageBar';
  storageBar.style.cssText = 'position:fixed;bottom:100px;left:30px;z-index:201;display:none;background:var(--card-bg);border-radius:10px;padding:8px 12px;border:1px solid var(--border);font-size:0.75em;color:var(--text-secondary);max-width:200px;';
  storageBar.innerHTML = '<div id="storageText"></div><div style="background:var(--accent-light);border-radius:4px;height:6px;margin-top:4px;overflow:hidden;"><div id="storageFill" style="height:100%;background:var(--accent);transition:width 0.5s;border-radius:4px;"></div></div><button id="btnClearStorage" style="margin-top:6px;padding:2px 8px;font-size:0.7em;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;">🗑️ 清理缓存</button>';
  document.body.appendChild(storageBar);

  document.getElementById('btnClearStorage').addEventListener('click', () => {
    if (confirm('确定要清理浏览器缓存吗？\n\n清理后将强制从 posts.json 重新加载。\n（设置和个人资料不受影响）')) {
      localStorage.removeItem(STATE_KEY);
      location.reload();
    }
  });
}

function exportJSON() {
  const exportData = {
    _meta: {
      aboutText: settings.aboutText,
      profileName: settings.profileName,
      profileBio: settings.profileBio,
      profileAvatar: settings.profileAvatar,
      musicPlaylist: musicPlaylist,
      exportedAt: new Date().toISOString()
    },
    posts: posts
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'posts.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📦 posts.json 已下载到系统"下载"文件夹！（含关于信息 + ' + posts.length + ' 条动态）请将其复制到项目根目录');
}

// ============ Escape HTML ============
function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
